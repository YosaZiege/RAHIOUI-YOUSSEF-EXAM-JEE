<div class="login-page">
  <div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">🛡️</div>
      <div>
        <h1 class="brand-name">Assurance<span>Pro</span></h1>
        <p class="brand-tagline">Gestion des contrats d'assurance</p>
      </div>
    </div>

    @if (error()) {
      <div class="error-box">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label>Identifiant</label>
        <input formControlName="username" type="text" placeholder="admin" autocomplete="username" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input formControlName="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" [disabled]="form.invalid || loading()">
        @if (loading()) { <span class="spinner"></span> }
        @else { Se connecter → }
      </button>
    </form>

    <div class="hint-box">
      <p class="hint-title">Comptes de démonstration</p>
      <div class="hint-rows">
        <span><b>admin</b> / admin1234 — Administrateur</span>
        <span><b>employe</b> / employe1234 — Employé</span>
        <span><b>client1</b> / client1234 — Client</span>
      </div>
    </div>
  </div>
</div>
